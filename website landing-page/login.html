<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Wisata Indonesia</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">

  <!-- Container Login -->
  <div class="min-h-screen flex items-center justify-center">
    <div class="bg-white shadow-lg rounded-xl p-8 w-full max-w-md">
      <!-- Header Form -->
      <h2 class="text-3xl font-bold text-center text-blue-500 mb-5">Login</h2>
      <p class="text-center text-gray-600 mb-6">Masuk untuk mengakses fitur wisata Indonesia</p>

      <!-- Form -->
      <form action="/login" method="POST" class="space-y-5">
        <!-- Email -->
        <div>
          <label for="email" class="block text-gray-700 font-medium mb-2">Email</label>
          <input type="email" id="email" name="email" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <!-- Password -->
        <div>
          <label for="password" class="block text-gray-700 font-medium mb-2">Password</label>
          <input type="password" id="password" name="password" required
            class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
        </div>

        <!-- Remember Me & Forgot -->
        <div class="flex items-center justify-between">
          <label class="flex items-center space-x-2">
            <input type="checkbox" class="form-checkbox h-4 w-4 text-red-500">
            <span class="text-gray-600">Ingat saya</span>
          </label>
          <a href="#" class="text-red-500 hover:underline text-sm">Lupa Password?</a>
        </div>

        <!-- Button Login -->
        <button type="submit"
          class="w-full bg-blue-500 hover:bg-blue-500 text-white font-bold py-3 rounded-lg shadow-md transition transform hover:-translate-y-1">
          Login
        </button>
      </form>

      <!-- Register Link -->
      <p class="text-center text-gray-600 mt-6">Belum punya akun? 
        <a href="/register" class="text-red-500 hover:underline">Daftar sekarang</a>
      </p>
    </div>
  </div>

</body>
</html>
